<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>News — Mentone Hockey Club</title>
<link rel="stylesheet" href="colors_and_type.css">
<link rel="stylesheet" href="site.css">
<style>
  .news-page-hero {
    background: var(--navy);
    padding: 72px 0 52px;
    position: relative;
    overflow: hidden;
  }
  .news-page-hero::before {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(90deg, rgba(255,255,255,.015) 0, rgba(255,255,255,.015) 1px, transparent 1px, transparent 120px);
    pointer-events: none;
  }

  /* Filter bar */
  .news-filters {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 48px;
  }
  .news-filter-btn {
    padding: 8px 18px;
    border-radius: var(--radius-pill);
    font-size: 13px;
    font-weight: 600;
    letter-spacing: .04em;
    border: 1.5px solid var(--line);
    background: none;
    color: var(--muted);
    cursor: pointer;
    transition: all .2s;
    font-family: var(--body);
  }
  .news-filter-btn:hover { border-color: var(--navy); color: var(--navy); }
  .news-filter-btn.active { background: var(--navy); color: var(--cream); border-color: var(--navy); }

  /* Featured article — big top card */
  .news-featured {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0;
    border-radius: var(--radius-md);
    overflow: hidden;
    margin-bottom: 48px;
    box-shadow: var(--shadow-md);
    text-decoration: none;
    color: inherit;
    transition: transform .25s, box-shadow .25s;
  }
  .news-featured:hover { transform: translateY(-3px); box-shadow: var(--shadow-lg); }
  .news-featured-img {
    min-height: 340px;
    background-size: cover;
    background-position: center;
  }
  .news-featured-body {
    background: var(--navy);
    padding: 48px;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
  }
  .news-featured-cat {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: .2em;
    text-transform: uppercase;
    color: var(--yellow);
    margin-bottom: 14px;
  }
  .news-featured-title {
    font-family: var(--display);
    font-size: 28px;
    font-weight: 400;
    color: var(--cream);
    line-height: 1.2;
    margin-bottom: 16px;
  }
  .news-featured-excerpt {
    color: rgba(246,241,230,.65);
    font-size: 15px;
    line-height: 1.6;
    margin-bottom: 24px;
  }
  .news-featured-date {
    font-size: 13px;
    color: rgba(246,241,230,.4);
    letter-spacing: .04em;
  }

  /* Grid cards */
  .news-grid-inner {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 24px;
  }

  /* Loading / empty */
  .news-loading {
    text-align: center;
    padding: 80px 0;
    color: var(--muted);
  }
  .news-empty {
    padding: 48px 0;
    color: var(--muted);
    font-size: 15px;
  }

  /* Category colour dots */
  .cat-dot {
    display: inline-block;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    margin-right: 6px;
    vertical-align: middle;
  }
  .cat-mens { background: var(--yellow); }
  .cat-womens { background: var(--blue); }
  .cat-juniors { background: #e67e22; }
  .cat-masters { background: #8e44ad; }
  .cat-club { background: var(--muted); }

  @media (max-width: 768px) {
    .news-featured { grid-template-columns: 1fr; }
    .news-featured-img { min-height: 200px; }
    .news-featured-body { padding: 28px; }
    .news-featured-title { font-size: 22px; }
    .news-grid-inner { grid-template-columns: 1fr; }
    .news-filters { gap: 6px; }
  }
</style>
</head>
<body>
<div id="site-announce"></div>
<div id="site-nav"></div>

<!-- PAGE HERO -->
<section class="news-page-hero">
  <div class="wrap">
    <div class="eyebrow" style="color:var(--yellow);margin-bottom:16px;">What's happening</div>
    <h1 style="color:var(--cream);max-width:600px;">Club news &amp; <em>moments.</em></h1>
    <p class="lead" style="color:rgba(246,241,230,0.7);max-width:500px;margin-top:16px;">Wins, milestones, and everything in between — from all sections of the club.</p>
  </div>
</section>

<!-- NEWS CONTENT -->
<section class="section">
  <div class="wrap">
    <div id="news-content">
      <div class="news-loading">Loading news…</div>
    </div>
  </div>
</section>

<div id="site-cta"></div>
<div id="site-footer"></div>
<script src="partials.js"></script>
<script>
(function() {

  const CATEGORIES = ['All', "Men's", "Women's", 'Juniors', 'Masters', 'Club'];

  const CAT_DOTS = {
    "Men's":    'cat-mens',
    "Women's":  'cat-womens',
    "Juniors":  'cat-juniors',
    "Masters":  'cat-masters',
    "Club":     'cat-club'
  };

  function formatDate(str) {
    return new Date(str + 'T00:00:00').toLocaleDateString('en-AU', { day: 'numeric', month: 'long', year: 'numeric' });
  }

  function catDot(cat) {
    return `<span class="cat-dot ${CAT_DOTS[cat] || 'cat-club'}"></span>`;
  }

  function renderFeatured(a) {
    return `
    <a href="#${a.id}" class="news-featured" onclick="showArticle('${a.id}'); return false;">
      <div class="news-featured-img" style="background-image:url('${a.image}')"></div>
      <div class="news-featured-body">
        <div class="news-featured-cat">${catDot(a.category)}${a.category}</div>
        <div class="news-featured-title">${a.title}</div>
        <div class="news-featured-excerpt">${a.excerpt}</div>
        <div class="news-featured-date">${formatDate(a.date)}</div>
      </div>
    </a>`;
  }

  function renderCard(a) {
    return `
    <a href="#${a.id}" class="news-card" onclick="showArticle('${a.id}'); return false;">
      <div class="news-img" style="background-image:linear-gradient(180deg,rgba(4,28,44,.1),rgba(2,18,28,.7)),url('${a.image}')">
        <span class="news-cat">${a.category}</span>
      </div>
      <div class="news-body">
        <div class="news-date">${formatDate(a.date)}</div>
        <h3 class="news-title">${a.title}</h3>
        <p class="news-excerpt">${a.excerpt}</p>
      </div>
    </a>`;
  }

  function renderFilters(activeCategory) {
    return `<div class="news-filters">
      ${CATEGORIES.map(c => `
        <button class="news-filter-btn${c === activeCategory ? ' active' : ''}"
          onclick="filterNews('${c}')">${c}</button>`).join('')}
    </div>`;
  }

  let allArticles = [];
  let currentFilter = 'All';

  window.filterNews = function(cat) {
    currentFilter = cat;
    renderNews();
  };

  window.showArticle = function(id) {
    const a = allArticles.find(x => x.id === id);
    if (!a) return;
    document.getElementById('news-content').innerHTML = `
      <button onclick="renderNews()" style="display:inline-flex;align-items:center;gap:8px;margin-bottom:32px;font-size:14px;color:var(--muted);background:none;border:none;cursor:pointer;font-family:var(--body);">
        ← Back to news
      </button>
      <div style="max-width:720px;">
        <div style="font-size:12px;letter-spacing:.16em;text-transform:uppercase;color:var(--yellow-deep);margin-bottom:12px;">${catDot(a.category)}${a.category}</div>
        <h1 style="margin-bottom:16px;">${a.title}</h1>
        <div style="font-size:14px;color:var(--muted);margin-bottom:32px;">${formatDate(a.date)}</div>
        <div style="aspect-ratio:16/7;background-image:url('${a.image}');background-size:cover;background-position:center;border-radius:4px;margin-bottom:36px;"></div>
        <p style="font-size:17px;line-height:1.7;color:var(--ink);">${a.body}</p>
      </div>`;
  };

  function renderNews() {
    const filtered = currentFilter === 'All'
      ? allArticles
      : allArticles.filter(a => a.category === currentFilter);

    const featured = filtered.filter(a => a.featured);
    const rest = filtered.filter(a => !a.featured);

    let html = renderFilters(currentFilter);

    if (filtered.length === 0) {
      html += `<div class="news-empty">No news in this category yet — check back soon.</div>`;
    } else {
      if (featured.length > 0) html += renderFeatured(featured[0]);
      const remaining = [...featured.slice(1), ...rest];
      if (remaining.length > 0) {
        html += `<div class="news-grid-inner">${remaining.map(renderCard).join('')}</div>`;
      }
    }

    html += `<div style="font-size:12px;color:var(--muted);margin-top:48px;padding-top:24px;border-top:1px solid var(--line-light);">Last updated: ${window._newsUpdated || ''}</div>`;
    document.getElementById('news-content').innerHTML = html;
  }

  fetch('news.json')
    .then(r => { if (!r.ok) throw new Error('Could not load news'); return r.json(); })
    .then(data => {
      allArticles = data.articles || [];
      window._newsUpdated = data.updated;
      renderNews();
    })
    .catch(err => {
      document.getElementById('news-content').innerHTML =
        `<div style="padding:32px;background:#fff3cd;border-radius:4px;font-size:14px;">News unavailable right now — please check back soon.<br/><small>${err.message}</small></div>`;
    });

})();
</script>
</body>
</html>
