<p style="font-weight: 400;">In 2024 Mentone Hockey Club will be fielding 4 teams in Hockey Victoria’s Men’s Mid-Week Competitions on a home and away ground basis. The teams will compete in the following grades:</p>
<p style="font-weight: 400;">Men’s Mid-Week Open South East A Grade – Monday Night
Men’s 45+ B South East B Grade – Monday Night
Men’s 45+ South East C Grade – Monday Night
Men’s 50+ B Grade  (may change to A grade) – Wednesday Night</p>
All four grades play their home fixtures at the Mentone Hockey Club, Keysborough (Mentone Grammar Playing Fields).

Hockey Victoria regulations allow individuals to play 45+ and/or 50+ for Mentone as well as representing their own club for weekend open grade play.

We are always on the lookout for new members at all skill levels so if you are thinking of playing Mid-Week Hockey please contact:
