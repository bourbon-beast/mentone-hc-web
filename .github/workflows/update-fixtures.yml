name: Update Fixtures

on:
  schedule:
    # Run every Tuesday at 10:00 AM AEST (Monday 00:00 UTC)
    # Adjust cron if mid-week games need earlier updates
    - cron: "0 0 * * 2"
  workflow_dispatch:  # Allow manual trigger from GitHub Actions UI

jobs:
  update-fixtures:
    runs-on: ubuntu-latest

    permissions:
      contents: write   # needed to push the updated fixtures.json

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Run fixtures scraper
        run: python scripts/update_fixtures.py

      - name: Commit and push if fixtures.json changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add fixtures.json
          if git diff --cached --quiet; then
            echo "No changes to fixtures.json — skipping commit."
          else
            git commit -m "chore: update fixtures.json [$(date -u +'%Y-%m-%d')]"
            git push
          fi
